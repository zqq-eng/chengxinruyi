<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>运动管理 - 秤心如意</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="flex h-screen overflow-hidden">
        <!-- 侧边栏 -->
        <aside class="bg-green-800 text-white w-64 sidebar">
            <div class="p-4 border-b border-green-700">
                <h1 class="text-xl font-bold">秤心如意</h1>
                <p class="text-sm text-green-200">后台管理系统</p>
            </div>
            
            <nav class="mt-6">
                <ul>
                    <li>
                        <a href="dashboard.html" class="flex items-center px-4 py-3 hover:bg-green-700 transition duration-200">
                            <i class="fa fa-dashboard w-6"></i>
                            <span>控制台</span>
                        </a>
                    </li>
                    <li>
                        <a href="users.html" class="flex items-center px-4 py-3 hover:bg-green-700 transition duration-200">
                            <i class="fa fa-users w-6"></i>
                            <span>用户管理</span>
                        </a>
                    </li>
                    <li>
                        <a href="sports.html" class="flex items-center px-4 py-3 bg-green-700">
                            <i class="fa fa-running w-6"></i>
                            <span>运动管理</span>
                        </a>
                    </li>
                    <li>
                        <a href="appointments.html" class="flex items-center px-4 py-3 hover:bg-green-700 transition duration-200">
                            <i class="fa fa-calendar w-6"></i>
                            <span>预约管理</span>
                        </a>
                    </li>
                    <li>
                        <a href="mall.html" class="flex items-center px-4 py-3 hover:bg-green-700 transition duration-200">
                            <i class="fa fa-shopping-cart w-6"></i>
                            <span>商城管理</span>
                        </a>
                    </li>
                    <li>
                        <a href="messages.html" class="flex items-center px-4 py-3 hover:bg-green-700 transition duration-200">
                            <i class="fa fa-envelope w-6"></i>
                            <span>消息管理</span>
                        </a>
                    </li>
                </ul>
            </nav>
            
            <div class="absolute bottom-0 w-64 p-4 border-t border-green-700">
                <div class="flex items-center">
                    <div class="w-8 h-8 rounded-full bg-green-400 flex items-center justify-center">
                        <span id="adminUsername" class="text-sm font-medium">A</span>
                    </div>
                    <div class="ml-3">
                        <p class="text-sm font-medium" id="adminName">管理员</p>
                        <button id="logoutBtn" class="text-xs text-green-200 hover:text-white">退出登录</button>
                    </div>
                </div>
            </div>
        </aside>
        
        <!-- 主内容区 -->
        <div class="flex-1 overflow-y-auto">
            <!-- 顶部导航栏 -->
            <header class="bg-white shadow-sm">
                <div class="flex items-center justify-between px-6 py-3">
                    <h2 class="text-lg font-medium text-gray-800">运动管理</h2>
                    <div class="flex items-center space-x-4">
                        <div class="relative">
                            <select id="sportType" class="border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                                <option value="runs">跑步记录</option>
                                <option value="workout">健身记录</option>
                                <option value="workout_checkins">健身打卡</option>
                            </select>
                        </div>
                    </div>
                </div>
            </header>
            
            <!-- 内容区域 -->
            <main class="px-6 py-8">
                <!-- 统计卡片 -->
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-6">
                    <div class="bg-white rounded-lg shadow p-6 border-l-4 border-green-500">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-sm font-medium text-gray-500">总用户数</p>
                                <p class="text-2xl font-bold text-gray-800" id="totalUsers">0</p>
                            </div>
                            <div class="bg-green-100 p-3 rounded-full">
                                <i class="fa fa-users text-green-600 text-xl"></i>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white rounded-lg shadow p-6 border-l-4 border-green-500">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-sm font-medium text-gray-500">总运动次数</p>
                                <p class="text-2xl font-bold text-gray-800" id="totalRuns">0</p>
                            </div>
                            <div class="bg-green-100 p-3 rounded-full">
                                <i class="fa fa-running text-green-600 text-xl"></i>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white rounded-lg shadow p-6 border-l-4 border-green-500">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-sm font-medium text-gray-500">总运动里程</p>
                                <p class="text-2xl font-bold text-gray-800" id="totalDistance">0.00</p>
                                <p class="text-xs text-gray-500">公里</p>
                            </div>
                            <div class="bg-green-100 p-3 rounded-full">
                                <i class="fa fa-road text-green-600 text-xl"></i>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white rounded-lg shadow p-6 border-l-4 border-green-500">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-sm font-medium text-gray-500">总运动时长</p>
                                <p class="text-2xl font-bold text-gray-800" id="totalDurationStr">0秒</p>
                            </div>
                            <div class="bg-green-100 p-3 rounded-full">
                                <i class="fa fa-clock-o text-green-600 text-xl"></i>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 图表区域 -->
                <div class="bg-white rounded-lg shadow p-6 mb-6">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-lg font-medium text-gray-800">运动趋势分析</h3>
                        <div class="flex space-x-2">
                            <button id="chartTypeRuns" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition duration-200">
                                运动次数
                            </button>
                            <button id="chartTypeDuration" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-green-600 hover:text-white transition duration-200">
                                运动时长
                            </button>
                        </div>
                    </div>
                    <div class="h-80">
                        <canvas id="trendChart"></canvas>
                    </div>
                </div>
                
                <!-- 导出按钮 -->
                <div class="flex justify-end mb-6">
                    <button id="exportSummary" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition duration-200 mr-2">
                        <i class="fa fa-download mr-2"></i> 导出汇总
                    </button>
                    <button id="exportDetails" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition duration-200">
                        <i class="fa fa-download mr-2"></i> 导出明细
                    </button>
                </div>
                
                <!-- 搜索和筛选 -->
                <div class="bg-white rounded-lg shadow p-4 mb-6">
                    <div class="flex flex-col md:flex-row md:items-center md:justify-between space-y-4 md:space-y-0">
                        <div class="flex items-center space-x-4">
                            <div class="relative">
                                <input type="text" id="searchKeyword" placeholder="搜索用户ID" class="pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent">
                                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500">
                                    <i class="fa fa-search"></i>
                                </span>
                            </div>
                            <button id="searchBtn" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition duration-200">
                                搜索
                            </button>
                        </div>
                        <div class="flex items-center space-x-4">
                            <select class="border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-green-500 focus:border-transparent">
                                <option value="">全部日期</option>
                                <option value="today">今天</option>
                                <option value="week">本周</option>
                                <option value="month">本月</option>
                            </select>
                            <select class="border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-green-500 focus:border-transparent">
                                <option value="">排序方式</option>
                                <option value="startTime">开始时间</option>
                                <option value="distance">距离</option>
                                <option value="duration">时长</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <!-- 运动记录列表 -->
                <div class="bg-white rounded-lg shadow mb-6">
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">用户</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">账号</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">运动次数</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">总里程(km)</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">总时长</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">平均每次(km)</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                                </tr>
                            </thead>
                            <tbody class="bg-white divide-y divide-gray-200 table-hover" id="sportList">
                                <!-- 运动记录列表将通过JavaScript动态生成 -->
                            </tbody>
                        </table>
                    </div>
                </div>
                
                <!-- 分页 -->
                <div class="flex items-center justify-between">
                    <div class="text-sm text-gray-500">
                        显示 <span id="showingFrom">1</span> 到 <span id="showingTo">10</span> 共 <span id="totalRecords">0</span> 条记录
                    </div>
                    <div class="flex items-center space-x-2">
                        <button class="px-3 py-1 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50 disabled:opacity-50" id="prevPage" disabled>
                            <i class="fa fa-chevron-left"></i>
                        </button>
                        <button class="px-3 py-1 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50 bg-green-600 text-white">1</button>
                        <button class="px-3 py-1 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50">2</button>
                        <button class="px-3 py-1 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50">3</button>
                        <button class="px-3 py-1 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50" id="nextPage">
                            <i class="fa fa-chevron-right"></i>
                        </button>
                    </div>
                </div>
            </main>
        </div>
    </div>
    
    <!-- 运动详情模态框 -->
    <div id="sportModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-2xl">
            <div class="px-6 py-4 border-b border-gray-200">
                <h3 class="text-lg font-medium text-gray-800">运动详情</h3>
                <button id="closeModal" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600">
                    <i class="fa fa-times"></i>
                </button>
            </div>
            <div class="p-6" id="sportDetail">
                <!-- 运动详情将通过JavaScript动态生成 -->
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
    <script src="assets/js/sports.js"></script>
</body>
</html>
