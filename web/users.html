<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - 秤心如意</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="flex h-screen overflow-hidden">
        <!-- 侧边栏 -->
        <aside class="bg-green-800 text-white w-64 sidebar">
            <div class="p-4 border-b border-green-700">
                <h1 class="text-xl font-bold">秤心如意</h1>
                <p class="text-sm text-green-200">后台管理系统</p>
            </div>
            
            <nav class="mt-6">
                <ul>
                    <li>
                        <a href="dashboard.html" class="flex items-center px-4 py-3 hover:bg-green-700 transition duration-200">
                            <i class="fa fa-dashboard w-6"></i>
                            <span>控制台</span>
                        </a>
                    </li>
                    <li>
                        <a href="users.html" class="flex items-center px-4 py-3 bg-green-700">
                            <i class="fa fa-users w-6"></i>
                            <span>用户管理</span>
                        </a>
                    </li>
                    <li>
                        <a href="sports.html" class="flex items-center px-4 py-3 hover:bg-green-700 transition duration-200">
                            <i class="fa fa-running w-6"></i>
                            <span>运动管理</span>
                        </a>
                    </li>
                    <li>
                        <a href="appointments.html" class="flex items-center px-4 py-3 hover:bg-green-700 transition duration-200">
                            <i class="fa fa-calendar w-6"></i>
                            <span>预约管理</span>
                        </a>
                    </li>
                    <li>
                        <a href="mall.html" class="flex items-center px-4 py-3 hover:bg-green-700 transition duration-200">
                            <i class="fa fa-shopping-cart w-6"></i>
                            <span>商城管理</span>
                        </a>
                    </li>
                    <li>
                        <a href="messages.html" class="flex items-center px-4 py-3 hover:bg-green-700 transition duration-200">
                            <i class="fa fa-envelope w-6"></i>
                            <span>消息管理</span>
                        </a>
                    </li>
                </ul>
            </nav>
            
            <div class="absolute bottom-0 w-64 p-4 border-t border-green-700">
                <div class="flex items-center">
                    <div class="w-8 h-8 rounded-full bg-green-400 flex items-center justify-center">
                        <span id="adminUsername" class="text-sm font-medium">A</span>
                    </div>
                    <div class="ml-3">
                        <p class="text-sm font-medium" id="adminName">管理员</p>
                        <button id="logoutBtn" class="text-xs text-green-200 hover:text-white">退出登录</button>
                    </div>
                </div>
            </div>
        </aside>
        
        <!-- 主内容区 -->
        <div class="flex-1 overflow-y-auto">
            <!-- 顶部导航栏 -->
            <header class="bg-white shadow-sm">
                <div class="flex items-center justify-between px-6 py-3">
                    <h2 class="text-lg font-medium text-gray-800">用户管理</h2>
                    <div class="flex items-center space-x-4">
                        <button class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition duration-200 btn-hover">
                            <i class="fa fa-plus mr-2"></i> 添加用户
                        </button>
                    </div>
                </div>
            </header>
            
            <!-- 内容区域 -->
            <main class="px-6 py-8">
                <!-- 搜索和筛选 -->
                <div class="bg-white rounded-lg shadow p-4 mb-6">
                    <div class="flex flex-col md:flex-row md:items-center md:justify-between space-y-4 md:space-y-0">
                        <div class="flex items-center space-x-4">
                            <div class="relative">
                                <input type="text" id="searchKeyword" placeholder="搜索用户名、手机号" class="pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent">
                                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500">
                                    <i class="fa fa-search"></i>
                                </span>
                            </div>
                            <button id="searchBtn" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition duration-200">
                                搜索
                            </button>
                        </div>
                        <div class="flex items-center space-x-4">
                            <select class="border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-green-500 focus:border-transparent">
                                <option value="">全部状态</option>
                                <option value="active">活跃</option>
                                <option value="inactive">未活跃</option>
                            </select>
                            <select class="border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-green-500 focus:border-transparent">
                                <option value="">排序方式</option>
                                <option value="createdAt">注册时间</option>
                                <option value="nickName">用户名</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <!-- 用户列表 -->
                <div class="bg-white rounded-lg shadow mb-6">
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider" data-field="account">账号</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider" data-field="name">姓名</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider" data-field="school">学校</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider" data-field="major">专业</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider" data-field="gender">性别</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider" data-field="height">身高</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider" data-field="targetWeight">目标体重</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider" data-field="phone">手机号</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider" data-field="weightCount">体重记录</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider" data-field="runCount">运动记录</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider" data-field="createdAtStr">注册时间</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                                </tr>
                            </thead>
                            <tbody class="bg-white divide-y divide-gray-200 table-hover" id="userList">
                                <!-- 用户列表将通过JavaScript动态生成 -->
                            </tbody>
                        </table>
                    </div>
                </div>
                
                <!-- 分页 -->
                <div class="flex items-center justify-between">
                    <div class="text-sm text-gray-500">
                        显示 <span id="showingFrom">1</span> 到 <span id="showingTo">10</span> 共 <span id="totalUsers">0</span> 条记录
                    </div>
                    <div class="flex items-center space-x-2">
                        <button class="px-3 py-1 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50 disabled:opacity-50" id="prevPage" disabled>
                            <i class="fa fa-chevron-left"></i>
                        </button>
                        <button class="px-3 py-1 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50 bg-green-600 text-white">1</button>
                        <button class="px-3 py-1 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50">2</button>
                        <button class="px-3 py-1 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50">3</button>
                        <button class="px-3 py-1 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50" id="nextPage">
                            <i class="fa fa-chevron-right"></i>
                        </button>
                    </div>
                </div>
            </main>
        </div>
    </div>
    
    <!-- 用户编辑模态框 -->
    <div id="userModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md">
            <div class="px-6 py-4 border-b border-gray-200">
                <h3 class="text-lg font-medium text-gray-800" id="modalTitle">编辑用户</h3>
                <button id="closeModal" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600">
                    <i class="fa fa-times"></i>
                </button>
            </div>
            <div class="p-6">
                <form id="userForm">
                    <input type="hidden" id="userId">
                    <div class="mb-4">
                        <label for="account" class="block text-sm font-medium text-gray-700 mb-1">账号</label>
                        <input type="text" id="account" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent">
                    </div>
                    <div class="mb-4">
                        <label for="name" class="block text-sm font-medium text-gray-700 mb-1">姓名</label>
                        <input type="text" id="name" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent">
                    </div>
                    <div class="mb-4">
                        <label for="school" class="block text-sm font-medium text-gray-700 mb-1">学校</label>
                        <input type="text" id="school" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent">
                    </div>
                    <div class="mb-4">
                        <label for="major" class="block text-sm font-medium text-gray-700 mb-1">专业</label>
                        <input type="text" id="major" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent">
                    </div>
                    <div class="mb-4">
                        <label for="gender" class="block text-sm font-medium text-gray-700 mb-1">性别</label>
                        <select id="gender" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent">
                            <option value="">未知</option>
                            <option value="男">男</option>
                            <option value="女">女</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label for="height" class="block text-sm font-medium text-gray-700 mb-1">身高 (cm)</label>
                        <input type="number" id="height" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent">
                    </div>
                    <div class="mb-4">
                        <label for="targetWeight" class="block text-sm font-medium text-gray-700 mb-1">目标体重 (kg)</label>
                        <input type="number" id="targetWeight" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent">
                    </div>
                    <div class="mb-4">
                        <label for="phone" class="block text-sm font-medium text-gray-700 mb-1">手机号</label>
                        <input type="text" id="phone" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent">
                    </div>
                    <div class="mt-6">
                        <button type="submit" class="w-full bg-green-600 text-white py-2 px-4 rounded-lg hover:bg-green-700 transition duration-200">
                            保存
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="assets/js/users.js"></script>
</body>
</html>
